[build]
  publish = ".next"
  command = "npm run build"

[functions]
  included_files = ["hud-wrapper"]

[functions."*"]
  node_bundler = "esbuild"

[functions."*".node_bundler]
  external = ["hud-sdk"]

[functions.environment]
  HUD_ENABLE = "true"
  HUD_KEY = "@hud-key"
  HUD_SERVICE = "@hud-service"
  AWS_LAMBDA_EXEC_WRAPPER = "./hud-wrapper"